<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "MSV Rufi‑Maseltrangen – ESF Chur 2026" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        *,*::before, *::after {
        box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            color: #222;
        }

        header {
            background: #0b5ed7;
            color: rgb(255, 238, 0);
            padding: 1rem;
        }
        .footer {
            margin-top: 3rem;
            padding: 1rem;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            font-size: 0.85rem;
            color: #555;
        }   

        .footer-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            text-align: center;
        }
        
        header h1 {
            margin: 0;
            font-size: 1.4rem;
        }

        header h2 {
            margin: 0;
            font-size: 1.0rem;
        }
        
        h1, h2 {
            display: block;
        }

        main {
            max-width: 1000px;
            margin: auto;
            padding: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }

        .card {
            background: white;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .verein {
            background: #d1e7dd;
            color: #0f5132;
        }

        .einzel {
            background: #cff4fc;
            color: #055160;
        }

        .button {
            display: inline-block;
            padding: 0.5rem 0.9rem;
            background: #0b5ed7;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }

        .button:hover {
            background: #094bb5;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            border-bottom: 1px solid #ddd;
            padding: 0.5rem;
            text-align: left;
        }

        th {
            background: #f0f0f0;
        }

        td.rang {
            text-align: center;
            width: 60px;
        }

        td.total {
            text-align: right;
            font-weight: bold;
            width: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            }

        /*  ===============================
            MOBILE CARD LAYOUT – EINHEITLICH
            =============================== */
            @media (max-width: 768px) {

            body {
                background: #f2f2f2;
            }

            table {
                border: none;
                width: 100%;
            }

            table thead {
                display: none;
            }

            table tbody tr {
                display: block;
                background: #ffffff;
                border-radius: 14px;
                padding: 0.8rem 1rem;
                margin-bottom: 1rem;
                box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            }

            table td {
                    display: grid;
                    grid-template-columns: 1fr auto; /* links Titel, rechts Wert */
                    align-items: center;
                    gap: 1rem;
                    padding: 0.4rem 0;
                }

                /* Titel links */
                table td::before {
                    content: attr(data-label);
                    font-weight: 600;
                    color: #666;
                    text-align: left;
                }

                /* ✅ Wert IMMER rechts */
                table td .value {
                    justify-self: end;
                    text-align: right;
                    font-weight: 500;
                    color: #000;
                }

                /* Links wie normale Werte behandeln */
                table td .value a {
                    text-decoration: none;
                    font-weight: 600;
                    color: #0a58ca;
                }

                /* Total stärker hervorheben */
                table td.total .value {
                    font-size: 1.1rem;
                    font-weight: 700;
                }


                /* Rang dezenter */
                table td.rang {
                    color: #444;
                }

                /* Namen/Gruppe gut lesbar */
                table td strong {
                    font-weight: 600;
                }

                /* Buttons mobil */            
                .button {
                        display: block;
                        width: 100%;
                        max-width: 100%;
                        padding: 0.75rem 1rem;
                        border-radius: 12px;
                        text-align: center;
                        box-sizing: border-box;
                    }

}
    </style>
</head>
<body>

<header>
    <h1>MSV Rufi‑Maseltrangen – ESF Chur 2026</h1>
    <h2>Allegra a la Festa federala da tir 2026 Cuira I Grischun </h2>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <div class="footer-content">
        <span>© {{ 2026 }} MSV Rufi‑Maseltrangen</span>
        <span>•</span>
        <span>Tradiziun e passiun</span>
        <span>•</span>
        <span>Resultate live aus dem Schützenportal</span>
    </div>
</footer>
``

</body>
</html>
